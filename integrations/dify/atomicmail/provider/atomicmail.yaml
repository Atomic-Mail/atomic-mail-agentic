credentials_schema:
  - name: api_key
    type: secret-input
    required: false
    label:
      en_US: API Key
      zh_Hans: API 密钥
      pt_BR: Chave de API
      ja_JP: API キー
    placeholder:
      en_US: Optional existing Atomic Mail API key
      zh_Hans: 可选：已有的 Atomic Mail API 密钥
      pt_BR: Chave de API do Atomic Mail (opcional)
      ja_JP: "任意: 既存の Atomic Mail API キー"
    help:
      en_US: >-
        Optional. Set this if you already have an Atomic Mail API key and want
        to skip Register in first-run workflows.
      zh_Hans: >-
        可选。如果你已有 Atomic Mail API 密钥，可填写后在首次流程中跳过 Register。
      pt_BR: >-
        Opcional. Preencha se você já tem uma chave de API da Atomic Mail e quer
        pular Register no primeiro fluxo.
      ja_JP: >-
        任意です。既存の Atomic Mail API キーがある場合は入力すると初回フローで
        Register を省略できます。
  - name: auth_url
    type: text-input
    required: false
    label:
      en_US: Auth URL
      zh_Hans: 认证 URL
      pt_BR: URL de autenticação
      ja_JP: 認証 URL
    placeholder:
      en_US: https://auth.atomicmail.ai
      zh_Hans: https://auth.atomicmail.ai
      pt_BR: https://auth.atomicmail.ai
      ja_JP: https://auth.atomicmail.ai
    help:
      en_US: >-
        Optional auth service endpoint. Leave default unless you were given a
        custom environment URL.
      zh_Hans: >-
        可选认证服务地址。除非你收到专用环境地址，否则保持默认值即可。
      pt_BR: >-
        Endpoint opcional do serviço de autenticação. Mantenha o padrão, a menos
        que você tenha recebido uma URL de ambiente customizada.
      ja_JP: >-
        任意の認証サービス URL です。専用環境の URL を案内されていない限り、
        既定値のままにしてください。
  - name: api_url
    type: text-input
    required: false
    label:
      en_US: API URL
      zh_Hans: API URL
      pt_BR: URL da API
      ja_JP: API URL
    placeholder:
      en_US: https://api.atomicmail.ai
      zh_Hans: https://api.atomicmail.ai
      pt_BR: https://api.atomicmail.ai
      ja_JP: https://api.atomicmail.ai
    help:
      en_US: >-
        Optional JMAP/API endpoint. Keep default for production Atomic Mail unless
        your team uses a custom deployment.
      zh_Hans: >-
        可选 JMAP/API 地址。若使用官方生产环境请保持默认，只有在团队使用私有部署时再修改。
      pt_BR: >-
        Endpoint JMAP/API opcional. Mantenha o padrão na produção da Atomic Mail,
        exceto se sua equipe usar uma implantação customizada.
      ja_JP: >-
        任意の JMAP/API エンドポイントです。通常は既定値を使用し、チームで
        カスタム環境を利用する場合のみ変更してください。

tools:
  - tools/register.yaml
  - tools/help.yaml
  - tools/list_inbox.yaml
  - tools/jmap_request.yaml
  - tools/send_mail.yaml
  - tools/reply.yaml
extra:
  python:
    source: provider/atomicmail.py
