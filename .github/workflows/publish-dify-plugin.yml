name: Publish Dify plugin package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Semver to build (e.g. 0.1.2 or v1.0.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-dify-plugin-${{ github.event.release.tag_name || inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve and validate version
        id: version
        working-directory: ts
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          VERSION=$(deno run -A resolve_release_version.ts "$RELEASE_TAG")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Dify package version: $VERSION"

      - name: Build Dify wrapper with release version
        working-directory: ts
        run: deno run -A build_dify_wrapper.ts "${{ steps.version.outputs.version }}"

      - name: Download Dify packaging CLI
        env:
          DIFY_PLUGIN_DAEMON_VERSION: 0.0.6
        run: |
          curl -L \
            "https://github.com/langgenius/dify-plugin-daemon/releases/download/${DIFY_PLUGIN_DAEMON_VERSION}/dify-plugin-linux-amd64" \
            -o /tmp/dify-plugin-linux-amd64
          chmod +x /tmp/dify-plugin-linux-amd64

      - name: Package Dify plugin
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT="atomicmail-${VERSION}.difypkg"
          /tmp/dify-plugin-linux-amd64 plugin package integrations/dify/atomicmail -o "$OUTPUT"
          echo "artifact=$OUTPUT" >> "$GITHUB_OUTPUT"
          ls -lh "$OUTPUT"

      - name: Upload package to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ steps.package.outputs.artifact }}" --clobber
