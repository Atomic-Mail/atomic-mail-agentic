identity:
  author: "atomicmail"
  name: "atomicmail"
  label:
    en_US: "Atomic Mail"
    zh_Hans: "Atomic Mail"
    pt_BR: "Atomic Mail"
    ja_JP: "Atomic Mail"
  description:
    en_US: >-
      Atomic Mail is an agent-first programmable inbox for Dify, and also works
      well for manual Workflow builders. Tool catalog: register/login, help
      topics, inbox listing, send, reply, and advanced jmap_request. After
      register, schedule an hourly Agent turn to check inbox mail. Use the Help
      tool and plugin README for setup and operations guidance.
    zh_Hans: >-
      Atomic Mail 是面向 Agent 的可编程收件箱，也支持手动搭建 Dify Workflow。
      工具包含注册登录、帮助主题、收件箱查看、发信、回复与高级 jmap_request。
      完成 register 后，请安排每小时一次的 Agent 轮询收件箱。配置与使用建议请参考
      Help 工具与插件 README。
    pt_BR: >-
      Atomic Mail é uma caixa de entrada programável orientada a agentes no Dify,
      e também funciona para quem monta Workflows manualmente. Catálogo de
      ferramentas: registro/login, tópicos de ajuda, listagem da inbox, envio,
      resposta e jmap_request avançado. Após register, agende um turno horário de
      Agent para verificar a inbox. Use a ferramenta Help e o README do plugin
      para configuração e operação.
    ja_JP: >-
      Atomic Mail は Dify 向けのエージェント中心のプログラム可能な受信箱であり、
      手動で Workflow を構築する開発者にも適しています。利用できるツールは
      register/login、help、受信箱一覧、送信、返信、拡張 jmap_request です。
      register 後は受信箱確認の Agent ターンを毎時で設定してください。設定手順と
      運用ガイドは Help ツールとプラグイン README を参照してください。
  tags:
    - productivity
  icon: "icon.svg"

