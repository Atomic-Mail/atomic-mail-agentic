name: Test Dify Plugin

on:
  push:
    paths:
      - "integrations/dify/**"
      - "py/**"
      - "shared/**"
      - "ts/build_dify_wrapper.ts"
      - ".github/workflows/test-dify-plugin.yml"
  pull_request:
    paths:
      - "integrations/dify/**"
      - "py/**"
      - "shared/**"
      - "ts/build_dify_wrapper.ts"
      - ".github/workflows/test-dify-plugin.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-dify-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Dify vendor wrapper
        run: npm run build:dify

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r integrations/dify/atomicmail/requirements.txt

      - name: Run Dify plugin tests
        run: python -m pytest integrations/dify/atomicmail/tests

      - name: Run Python SDK parity tests
        working-directory: py
        run: python -m pytest
