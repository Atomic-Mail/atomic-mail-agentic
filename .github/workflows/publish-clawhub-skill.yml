name: Publish ClawHub skill

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Semver to publish (e.g. 0.1.2 or v1.0.0)
        required: true
        type: string
      dry_run:
        description: Skip ClawHub upload (build + verify only)
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-clawhub-skill-${{ github.event.release.tag_name || inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve and validate version
        id: version
        working-directory: ts
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          VERSION=$(deno run -A resolve_release_version.ts "$RELEASE_TAG")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing skill version: $VERSION"

      - name: Build skill npm package
        working-directory: ts
        run: deno run -A build_skill_npm.ts "${{ steps.version.outputs.version }}"

      - name: Build ClawHub skill package
        working-directory: ts
        run: deno run -A build_clawhub_skill.ts "${{ steps.version.outputs.version }}"

      - name: Upload ClawHub skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawhub-skill-atomicmail
          path: integrations_dist/clawhub/atomicmail
          if-no-files-found: error

  verify:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild ClawHub skill package
        working-directory: ts
        run: |
          deno run -A build_skill_npm.ts "${{ needs.build.outputs.version }}"
          deno run -A build_clawhub_skill.ts "${{ needs.build.outputs.version }}"

      - name: Verify ClawHub skill layout and launcher
        working-directory: ts
        run: deno test --allow-read --allow-env --allow-write --allow-run clawhub_skill_build.test.ts

  publish:
    needs: [build, verify]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate publish credentials
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [[ -z "$CLAWHUB_TOKEN" ]]; then
            echo "::error::Real skill publishes need secrets.CLAWHUB_TOKEN."
            exit 1
          fi

      - name: Download ClawHub skill artifact
        uses: actions/download-artifact@v4
        with:
          name: clawhub-skill-atomicmail
          path: skill

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ClawHub CLI
        run: npm install -g clawhub@0.21.0

      - name: Write ClawHub config
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "clawhub-config.json"
          path.write_text(
              json.dumps(
                  {
                      "registry": "https://clawhub.ai",
                      "token": os.environ["CLAWHUB_TOKEN"],
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          print(path)
          PY
          echo "CLAWHUB_CONFIG_PATH=$RUNNER_TEMP/clawhub-config.json" >> "$GITHUB_ENV"

      - name: Publish skill to ClawHub
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          clawhub skill publish ./skill \
            --slug atomicmail \
            --name "Atomic Mail" \
            --version "$VERSION" \
            --owner atomicmail \
            --changelog "Release $VERSION"
