name: Publish Hermes skill

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Semver to publish (e.g. 0.1.2 or v1.0.0)
        required: true
        type: string
      dry_run:
        description: Skip in-repo tap commit (build + verify only)
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-hermes-skill-${{ github.event.release.tag_name || inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve and validate version
        id: version
        working-directory: ts
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          VERSION=$(deno run -A resolve_release_version.ts "$RELEASE_TAG")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing skill version: $VERSION"

      - name: Build skill npm package
        working-directory: ts
        run: deno run -A build_skill_npm.ts "${{ steps.version.outputs.version }}"

      - name: Build Hermes skill package
        working-directory: ts
        run: deno run -A build_hermes_skill.ts "${{ steps.version.outputs.version }}"

      - name: Upload Hermes skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-skill-atomicmail
          path: integrations_dist/hermes/atomicmail
          if-no-files-found: error

  verify:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild Hermes skill package
        working-directory: ts
        run: |
          deno run -A build_skill_npm.ts "${{ needs.build.outputs.version }}"
          deno run -A build_hermes_skill.ts "${{ needs.build.outputs.version }}"

      - name: Verify Hermes skill layout and launcher
        working-directory: ts
        run: deno test --allow-read --allow-env --allow-write --allow-run hermes_skill_build.test.ts

  publish:
    needs: [build, verify]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish || github.ref_name }}

      - name: Download Hermes skill artifact
        uses: actions/download-artifact@v4
        with:
          name: hermes-skill-atomicmail
          path: skill

      - name: Sync skill to integrations/hermes/atomicmail
        run: |
          rm -rf integrations/hermes/atomicmail
          mkdir -p integrations/hermes
          cp -a skill/. integrations/hermes/atomicmail/

      - name: Commit and push in-repo Hermes tap
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrations/hermes/atomicmail
          if git diff --staged --quiet; then
            echo "No changes to commit for integrations/hermes/atomicmail"
            exit 0
          fi
          git commit -m "chore(hermes): publish atomicmail skill v${VERSION}"
          git push
