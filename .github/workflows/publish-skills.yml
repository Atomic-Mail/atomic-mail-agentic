name: Publish skills

on:
  release:
    types: [published]
  push:
    branches: [main, master, develop]
    paths:
      - .github/workflows/publish-skills.yml
      - docs/SKILL.md
      - shared/**
      - ts/build_skill_npm.ts
      - ts/build_skill.ts
      - ts/build_clawhub_skill.ts
      - ts/build_hermes_skill.ts
      - ts/clawhub_skill_build.test.ts
      - ts/hermes_skill_build.test.ts
      - ts/skill_build.test.ts
      - ts/lib/build_skill.ts
      - ts/lib/build_skill_bundle.ts
      - ts/lib/build_clawhub_skill.ts
      - ts/lib/build_hermes_skill.ts
      - ts/lib/skill_md_transform.ts
      - ts/lib/hermes_skill_*.ts
      - ts/src/**
  workflow_dispatch:
    inputs:
      version:
        description: Semver to publish (e.g. 0.1.2 or v1.0.0)
        required: true
        type: string
      dry_run:
        description: Build + verify only; skip publish jobs
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-skills-${{ github.event.release.tag_name || inputs.version || github.sha }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve and validate version
        id: version
        working-directory: ts
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$RELEASE_TAG" ]]; then
            RAW_VERSION="$RELEASE_TAG"
          elif [[ -n "$INPUT_VERSION" ]]; then
            RAW_VERSION="$INPUT_VERSION"
          else
            RAW_VERSION="$(git describe --tags --abbrev=0)"
          fi
          VERSION="$(deno run -A resolve_release_version.ts "$RAW_VERSION")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing skill version: $VERSION"

      - name: Build skill npm package
        working-directory: ts
        run: deno run -A build_skill_npm.ts "${{ steps.version.outputs.version }}"

      - name: Build ClawHub and Hermes skill packages
        working-directory: ts
        run: |
          deno run -A build_skill.ts "${{ steps.version.outputs.version }}"
          deno run -A build_clawhub_skill.ts "${{ steps.version.outputs.version }}"
          deno run -A build_hermes_skill.ts "${{ steps.version.outputs.version }}"

      - name: Upload unified skill artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: unified-skill-atomicmail
          path: dist/skill/atomicmail
          if-no-files-found: error

      - name: Upload ClawHub skill artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: clawhub-skill-atomicmail
          path: integrations_dist/clawhub/atomicmail
          if-no-files-found: error

      - name: Upload Hermes skill artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-skill-atomicmail
          path: integrations_dist/hermes/atomicmail
          if-no-files-found: error

  verify:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild skill packages
        working-directory: ts
        run: |
          deno run -A build_skill_npm.ts "${{ needs.build.outputs.version }}"
          deno run -A build_skill.ts "${{ needs.build.outputs.version }}"
          deno run -A build_clawhub_skill.ts "${{ needs.build.outputs.version }}"
          deno run -A build_hermes_skill.ts "${{ needs.build.outputs.version }}"

      - name: Verify skill layout and launchers
        working-directory: ts
        run: deno test --allow-read --allow-env --allow-write --allow-run skill_build.test.ts clawhub_skill_build.test.ts hermes_skill_build.test.ts

  publish_clawhub:
    needs: [build, verify]
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate publish credentials
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [[ -z "$CLAWHUB_TOKEN" ]]; then
            echo "::error::Real skill publishes need secrets.CLAWHUB_TOKEN."
            exit 1
          fi

      - name: Download ClawHub skill artifact
        uses: actions/download-artifact@v4
        with:
          name: unified-skill-atomicmail
          path: skill

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ClawHub CLI
        run: npm install -g clawhub@0.21.0

      - name: Write ClawHub config
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "clawhub-config.json"
          path.write_text(
              json.dumps(
                  {
                      "registry": "https://clawhub.ai",
                      "token": os.environ["CLAWHUB_TOKEN"],
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          print(path)
          PY
          echo "CLAWHUB_CONFIG_PATH=$RUNNER_TEMP/clawhub-config.json" >> "$GITHUB_ENV"

      - name: Publish skill to ClawHub
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          clawhub skill publish ./skill \
            --slug atomicmail \
            --name "Atomic Mail" \
            --version "$VERSION" \
            --owner atomicmail \
            --changelog "Release $VERSION"

  publish_repo_skill:
    needs: [build, verify]
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish || github.ref_name }}

      - name: Download Hermes skill artifact
        uses: actions/download-artifact@v4
        with:
          name: unified-skill-atomicmail
          path: skill

      - name: Sync skill to integrations/skill/atomicmail
        run: |
          rm -rf integrations/skill/atomicmail
          mkdir -p integrations/skill
          cp -a skill/. integrations/skill/atomicmail/

      - name: Commit and push in-repo skill tap
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrations/skill/atomicmail
          if git diff --staged --quiet; then
            echo "No changes to commit for integrations/skill/atomicmail"
            exit 0
          fi
          git commit -m "chore(skill): publish atomicmail skill v${VERSION}"
          git push
